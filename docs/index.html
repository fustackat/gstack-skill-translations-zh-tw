<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>gstack SKILL 繁體中文翻譯</title>
  <style>
    :root {
      --bg: #f5f5f2;
      --panel: rgba(255, 255, 255, 0.8);
      --panel-strong: #ffffff;
      --text: #111111;
      --muted: #616161;
      --border: rgba(17, 17, 17, 0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      --accent: #111111;
      --accent-2: #555555;
      --hover: rgba(17, 17, 17, 0.06);
      --active: #111111;
      --active-text: #ffffff;
    }

    html[data-theme="dark"] {
      --bg: #0d0d0d;
      --panel: rgba(22, 22, 22, 0.92);
      --panel-strong: #161616;
      --text: #f3f3f3;
      --muted: #a7a7a7;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.45);
      --accent: #f3f3f3;
      --accent-2: #bbbbbb;
      --hover: rgba(255, 255, 255, 0.08);
      --active: #f3f3f3;
      --active-text: #111111;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(127, 127, 127, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(127, 127, 127, 0.12), transparent 24%),
        var(--bg);
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .shell {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 4px 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 26ch;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip, .theme-toggle, .menu-toggle {
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 120ms ease, background 180ms ease, border-color 180ms ease, color 180ms ease;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    .chip:hover, .theme-toggle:hover, .menu-toggle:hover, .nav-item:hover {
      transform: translateY(-1px);
    }

    .meta-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent), var(--panel-strong);
    }

    .meta-title {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-body {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .search:focus {
      border-color: rgba(127,127,127,0.5);
      box-shadow: 0 0 0 4px rgba(127,127,127,0.12);
    }

    .nav {
      flex: 1;
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      text-align: left;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 120ms ease, color 180ms ease;
    }

    .nav-item .label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .nav-item .sub {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .nav-item .badge {
      flex: none;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .nav-item.active {
      background: var(--active);
      color: var(--active-text);
      border-color: var(--active);
      box-shadow: var(--shadow);
    }

    .nav-item.active .sub,
    .nav-item.active .badge {
      color: inherit;
      border-color: rgba(255,255,255,0.18);
    }

    .sidebar-footer {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .content {
      min-width: 0;
      padding: 20px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .hero {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .hero h2 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .frame-shell {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 170px);
      border: 0;
      background: white;
    }

    .frame-topbar {
      position: absolute;
      inset: 0 0 auto 0;
      height: 12px;
      background: linear-gradient(90deg, #111, #777 50%, #bbb 100%);
      opacity: 0.08;
      pointer-events: none;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .empty-state.show { opacity: 1; }

    .mobile-toggle {
      display: none;
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .content { padding-top: 0; }
      iframe { min-height: 72vh; }
      .mobile-toggle { display: inline-flex; }
      .sidebar.collapsed .nav,
      .sidebar.collapsed .search,
      .sidebar.collapsed .meta-card,
      .sidebar.collapsed .sidebar-footer { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h1>gstack SKILL<br />繁體中文翻譯</h1>
          <p>左側點選文件，右側即時切換預覽。支援黑白主題。</p>
        </div>
        <button class="menu-toggle mobile-toggle" id="menuToggle" type="button">選單</button>
      </div>

      <div class="toolbar">
        <button class="theme-toggle" id="themeToggle" type="button">切換黑白主題</button>
        <a class="chip" id="openExternal" href="#" target="_blank" rel="noreferrer">另開分頁</a>
      </div>

      <div class="meta-card">
        <div class="meta-title">導航說明</div>
        <p class="meta-body">點左邊文件名稱即可載入右側閱讀區。搜尋框可快速過濾檔案。</p>
      </div>

      <input id="search" class="search" type="search" placeholder="搜尋文件，例如：qa、design、deploy…" autocomplete="off" />

      <nav class="nav" id="nav" aria-label="文件清單"></nav>

      <div class="sidebar-footer">
        <div><strong id="count"></strong> 個文件可讀。</div>
        <div>預設主題會記住你的選擇。</div>
      </div>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <h2 id="currentTitle">載入中…</h2>
          <p id="currentDesc">選一個文件開始閱讀。</p>
        </div>
        <div class="actions">
          <button class="chip" id="prevBtn" type="button">上一個</button>
          <button class="chip" id="nextBtn" type="button">下一個</button>
        </div>
      </section>

      <section class="frame-shell">
        <div class="frame-topbar"></div>
        <iframe id="viewer" name="viewer" title="文件閱讀區" loading="eager"></iframe>
        <div class="empty-state" id="emptyState">找不到符合條件的文件。</div>
      </section>
    </main>
  </div>

  <script>
    const docs = [
      "SKILL.zh-TW.md",
      "autoplan-SKILL.zh-TW.md",
      "benchmark-SKILL.zh-TW.md",
      "browse-SKILL.zh-TW.md",
      "canary-SKILL.zh-TW.md",
      "careful-SKILL.zh-TW.md",
      "codex-SKILL.zh-TW.md",
      "cso-SKILL.zh-TW.md",
      "design-consultation-SKILL.zh-TW.md",
      "design-review-SKILL.zh-TW.md",
      "document-release-SKILL.zh-TW.md",
      "freeze-SKILL.zh-TW.md",
      "gstack-upgrade-SKILL.zh-TW.md",
      "guard-SKILL.zh-TW.md",
      "investigate-SKILL.zh-TW.md",
      "land-and-deploy-SKILL.zh-TW.md",
      "office-hours-SKILL.zh-TW.md",
      "plan-ceo-review-SKILL.zh-TW.md",
      "plan-design-review-SKILL.zh-TW.md",
      "plan-eng-review-SKILL.zh-TW.md",
      "qa-SKILL.zh-TW.md",
      "qa-only-SKILL.zh-TW.md",
      "retro-SKILL.zh-TW.md",
      "review-SKILL.zh-TW.md",
      "setup-browser-cookies-SKILL.zh-TW.md",
      "setup-deploy-SKILL.zh-TW.md",
      "ship-SKILL.zh-TW.md",
      "unfreeze-SKILL.zh-TW.md",
    ];

    const els = {
      nav: document.getElementById('nav'),
      search: document.getElementById('search'),
      viewer: document.getElementById('viewer'),
      currentTitle: document.getElementById('currentTitle'),
      currentDesc: document.getElementById('currentDesc'),
      count: document.getElementById('count'),
      themeToggle: document.getElementById('themeToggle'),
      openExternal: document.getElementById('openExternal'),
      menuToggle: document.getElementById('menuToggle'),
      sidebar: document.getElementById('sidebar'),
      emptyState: document.getElementById('emptyState'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
    };

    const state = {
      active: null,
      filtered: [...docs],
    };

    function titleFrom(name) {
      return name.replace(/\.md$/i, '').replace(/-/g, ' ').replace(/_/g, ' ');
    }

    function docUrl(name) {
      return './' + name.replace(/\.md$/i, '.html');
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem('gstack-theme', theme);
      els.themeToggle.textContent = theme === 'dark' ? '切換白色主題' : '切換黑色主題';
    }

    function toggleTheme() {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      setTheme(next);
    }

    function renderNav() {
      els.nav.innerHTML = '';
      state.filtered.forEach((name) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-item';
        btn.dataset.name = name;
        btn.dataset.src = docUrl(name);
        btn.innerHTML = `
          <span>
            <span class="label">${name}</span>
            <span class="sub">${titleFrom(name)}</span>
          </span>
          <span class="badge">md</span>
        `;
        btn.addEventListener('click', () => loadDoc(name, true));
        els.nav.appendChild(btn);
      });
      els.count.textContent = state.filtered.length;
      els.emptyState.classList.toggle('show', state.filtered.length === 0);
    }

    function setActive(name, pushHash = true) {
      state.active = name;
      [...document.querySelectorAll('.nav-item')].forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.name === name);
      });
      const url = docUrl(name);
      els.openExternal.href = url;
      els.currentTitle.textContent = name;
      els.currentDesc.textContent = `正在閱讀：${titleFrom(name)}。`;
      els.viewer.src = url;
      if (pushHash) {
        history.replaceState(null, '', '#'+encodeURIComponent(name));
      }
    }

    function loadDoc(name, fromUser = false) {
      if (!docs.includes(name)) return;
      if (fromUser && window.innerWidth <= 980) {
        els.sidebar.classList.add('collapsed');
      }
      setActive(name, true);
    }

    function applyFilter() {
      const q = els.search.value.trim().toLowerCase();
      state.filtered = docs.filter((name) => name.toLowerCase().includes(q));
      renderNav();
      if (!state.filtered.includes(state.active)) {
        const next = state.filtered[0] || null;
        if (next) setActive(next, false);
      }
    }

    function currentIndex() {
      return docs.indexOf(state.active);
    }

    function step(delta) {
      const idx = currentIndex();
      if (idx === -1) return;
      const next = docs[(idx + delta + docs.length) % docs.length];
      setActive(next, true);
    }

    function initTheme() {
      const saved = localStorage.getItem('gstack-theme');
      if (saved === 'dark' || saved === 'light') {
        setTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark ? 'dark' : 'light');
    }

    els.themeToggle.addEventListener('click', toggleTheme);
    els.search.addEventListener('input', applyFilter);
    els.menuToggle.addEventListener('click', () => els.sidebar.classList.toggle('collapsed'));
    els.prevBtn.addEventListener('click', () => step(-1));
    els.nextBtn.addEventListener('click', () => step(1));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && window.innerWidth <= 980) {
        els.sidebar.classList.add('collapsed');
      }
      if (e.key === 'ArrowLeft' && (e.metaKey || e.altKey)) step(-1);
      if (e.key === 'ArrowRight' && (e.metaKey || e.altKey)) step(1);
    });

    initTheme();
    renderNav();

    const initial = decodeURIComponent((location.hash || '').replace(/^#/, ''));
    const start = docs.includes(initial) ? initial : docs[0];
    setActive(start, false);
    els.search.value = '';
  </script>
</body>
</html>
