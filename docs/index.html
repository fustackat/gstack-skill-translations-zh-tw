<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>gstack SKILL 繁體中文翻譯</title>
  <style>
    :root {
      --bg: #f3f1ec;
      --bg-elev: rgba(255,255,255,0.74);
      --panel: #ffffff;
      --panel-2: #f8f6f1;
      --text: #121212;
      --muted: #6b675f;
      --line: rgba(18,18,18,0.10);
      --line-strong: rgba(18,18,18,0.16);
      --accent: #151515;
      --accent-soft: #efede8;
      --shadow: 0 16px 50px rgba(0,0,0,0.08);
      --shadow-soft: 0 10px 28px rgba(0,0,0,0.05);
      --code-bg: #f2efe8;
      --quote-bg: #f7f4ee;
      --table-head: #f6f4ef;
      --scroll-track: #ece8df;
      --scroll-thumb: #b8b1a3;
      --link: #114eb8;
      --maxw: 980px;
    }

    html[data-theme="dark"] {
      --bg: #0c0c0d;
      --bg-elev: rgba(19,19,20,0.78);
      --panel: #151516;
      --panel-2: #1a1a1c;
      --text: #f4f4f4;
      --muted: #a4a4a8;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.16);
      --accent: #f5f5f5;
      --accent-soft: #202023;
      --shadow: 0 24px 72px rgba(0,0,0,0.45);
      --shadow-soft: 0 14px 32px rgba(0,0,0,0.28);
      --code-bg: #1d1d20;
      --quote-bg: #18181a;
      --table-head: #1b1b1d;
      --scroll-track: #131316;
      --scroll-thumb: #5a5a61;
      --link: #88b4ff;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    html {
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122,122,122,0.16), transparent 26%),
        radial-gradient(circle at bottom right, rgba(122,122,122,0.10), transparent 22%),
        var(--bg);
      transition: background 180ms ease, color 180ms ease;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }

    *::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scroll-track);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border: 3px solid var(--scroll-track);
      border-radius: 999px;
    }

    a { color: var(--link); }
    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      border-right: 1px solid var(--line);
      background: var(--bg-elev);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      padding: 4px 2px 2px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn, .search {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .btn {
      border-radius: 14px;
      padding: 10px 14px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 120ms ease, background 160ms ease, border-color 160ms ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .search {
      width: 100%;
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
    }

    .search:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(127,127,127,0.10), var(--shadow-soft);
    }

    .sidebar-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
    }

    .stat strong {
      display: block;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .nav-wrap {
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-title {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 0 0 8px;
      padding: 8px 2px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: linear-gradient(180deg, var(--bg-elev), rgba(0,0,0,0));
    }

    .nav-group {
      display: grid;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: transparent;
      color: inherit;
      padding: 12px 13px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .nav-item:hover {
      transform: translateY(-1px);
      background: var(--accent-soft);
    }

    .nav-item.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .nav-item.active .nav-sub,
    .nav-item.active .nav-badge {
      color: inherit;
      opacity: 0.88;
    }

    .nav-main {
      min-width: 0;
    }

    .nav-label {
      display: block;
      font-weight: 650;
      font-size: 14px;
      letter-spacing: -0.01em;
      word-break: break-word;
    }

    .nav-sub {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .nav-badge {
      flex: none;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .main {
      min-width: 0;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero, .viewer {
      border: 1px solid var(--line);
      background: var(--bg-elev);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .hero {
      border-radius: 28px;
      padding: 22px 24px;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .hero h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1.03;
      letter-spacing: -0.06em;
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
      max-width: 60ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .viewer-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(127,127,127,0.06), transparent), var(--panel);
    }

    .viewer-topbar .left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
    }

    .doc-meta {
      min-width: 0;
    }

    .doc-meta strong,
    .doc-meta span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-meta strong { font-size: 14px; }
    .doc-meta span { font-size: 12px; color: var(--muted); }

    .viewer-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: var(--panel);
      padding: 0;
    }

    .content-shell {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 34px 28px 80px;
    }

    .loading {
      color: var(--muted);
      display: grid;
      gap: 12px;
    }

    .loading .bar {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-soft), var(--panel-2), var(--accent-soft));
      background-size: 220% 100%;
      animation: shimmer 1.35s linear infinite;
    }

    .loading .bar:nth-child(1) { width: 46%; height: 22px; }
    .loading .bar:nth-child(2) { width: 92%; }
    .loading .bar:nth-child(3) { width: 86%; }
    .loading .bar:nth-child(4) { width: 78%; }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -20% 0; }
    }

    .markdown-body {
      color: var(--text);
      line-height: 1.82;
      font-size: 16px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      word-break: break-word;
    }

    .markdown-body > *:first-child { margin-top: 0 !important; }
    .markdown-body > *:last-child { margin-bottom: 0 !important; }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.04em;
      margin: 1.5em 0 0.56em;
      scroll-margin-top: 24px;
    }

    .markdown-body h1 { font-size: 2.3em; }
    .markdown-body h2 {
      font-size: 1.72em;
      padding-bottom: 0.36em;
      border-bottom: 1px solid var(--line);
    }
    .markdown-body h3 { font-size: 1.34em; }
    .markdown-body h4 { font-size: 1.12em; }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body pre,
    .markdown-body blockquote,
    .markdown-body table,
    .markdown-body hr {
      margin: 1.05em 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.4em;
    }

    .markdown-body li { margin: 0.34em 0; }

    .markdown-body a {
      color: var(--link);
      text-underline-offset: 0.18em;
      text-decoration-thickness: 0.08em;
    }

    .markdown-body hr {
      border: 0;
      border-top: 1px solid var(--line);
    }

    .markdown-body code {
      background: var(--code-bg);
      padding: 0.16em 0.42em;
      border-radius: 8px;
      font-size: 0.94em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .markdown-body pre {
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: var(--shadow-soft);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      font-size: 0.92em;
    }

    .markdown-body blockquote {
      margin-left: 0;
      margin-right: 0;
      padding: 14px 18px;
      border-left: 4px solid var(--line-strong);
      background: var(--quote-bg);
      border-radius: 16px;
      color: var(--muted);
    }

    .markdown-body table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
    }

    .markdown-body th,
    .markdown-body td {
      padding: 12px 14px;
      vertical-align: top;
      text-align: left;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .markdown-body th {
      background: var(--table-head);
      font-weight: 650;
    }

    .markdown-body tr:last-child td { border-bottom: 0; }
    .markdown-body th:last-child,
    .markdown-body td:last-child { border-right: 0; }

    .markdown-body img,
    .markdown-body svg,
    .markdown-body video,
    .markdown-body canvas {
      max-width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
    }

    .markdown-body details {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: var(--panel-2);
    }

    .markdown-body summary {
      cursor: pointer;
      font-weight: 650;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 54px 24px;
      border: 1px dashed var(--line-strong);
      border-radius: 20px;
      background: var(--panel-2);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .mobile-tools {
      display: none;
    }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 300px minmax(0, 1fr); }
      .hero h2 { font-size: 30px; }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .main { padding-top: 0; }
      .mobile-tools { display: inline-flex; }
      .sidebar.collapsed .nav-wrap,
      .sidebar.collapsed .search,
      .sidebar.collapsed .sidebar-meta { display: none; }
    }

    @media (max-width: 640px) {
      .sidebar, .main { padding: 14px; }
      .hero, .viewer { border-radius: 22px; }
      .viewer-topbar, .hero { padding: 16px; }
      .content-shell { padding: 24px 18px 56px; }
      .hero h2 { font-size: 26px; }
      .brand h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="eyebrow">Markdown Viewer</div>
        <h1>gstack SKILL<br />繁體中文翻譯</h1>
        <p>左側挑文件，右側直接顯示漂亮版 markdown。黑白主題、捲軸、字體與內文樣式都統一控制。</p>
      </div>

      <div class="toolbar">
        <button class="btn primary" id="themeToggle" type="button">切換黑白主題</button>
        <button class="btn mobile-tools" id="menuToggle" type="button">收合選單</button>
      </div>

      <input id="search" class="search" type="search" placeholder="搜尋文件，例如 qa / design / deploy" autocomplete="off" />

      <div class="sidebar-meta">
        <div class="stat"><strong id="docCount">0</strong><span>文件數量</span></div>
        <div class="stat"><strong id="groupCount">0</strong><span>分類區塊</span></div>
      </div>

      <div class="nav-wrap" id="navWrap"></div>
    </aside>

    <main class="main">
      <section class="hero">
        <div>
          <h2 id="docTitle">載入中…</h2>
          <p id="docSubtitle">準備把這個專案改成真正好看的 md 顯示器。</p>
        </div>
        <div class="hero-actions">
          <a class="btn" id="githubBtn" href="#" target="_blank" rel="noreferrer">GitHub</a>
          <a class="btn" id="rawBtn" href="#" target="_blank" rel="noreferrer">Raw</a>
        </div>
      </section>

      <section class="viewer">
        <div class="viewer-topbar">
          <div class="left">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <div class="doc-meta">
              <strong id="viewerName">載入中…</strong>
              <span id="viewerMeta">讀取 markdown 中</span>
            </div>
          </div>
        </div>
        <div class="viewer-body">
          <div class="content-shell">
            <article id="content" class="markdown-body"></article>
            <div class="footer-note">本站以同一套前端樣式直接渲染 markdown，不再依賴 GitHub Pages 預設內容頁樣式。</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const REPO = 'fustackat/gstack-skill-translations-zh-tw';
    const BRANCH = 'main';
    const DOCS = [
      'SKILL.zh-TW.md',
      'autoplan-SKILL.zh-TW.md',
      'benchmark-SKILL.zh-TW.md',
      'browse-SKILL.zh-TW.md',
      'canary-SKILL.zh-TW.md',
      'careful-SKILL.zh-TW.md',
      'codex-SKILL.zh-TW.md',
      'cso-SKILL.zh-TW.md',
      'design-consultation-SKILL.zh-TW.md',
      'design-review-SKILL.zh-TW.md',
      'document-release-SKILL.zh-TW.md',
      'freeze-SKILL.zh-TW.md',
      'gstack-upgrade-SKILL.zh-TW.md',
      'guard-SKILL.zh-TW.md',
      'investigate-SKILL.zh-TW.md',
      'land-and-deploy-SKILL.zh-TW.md',
      'office-hours-SKILL.zh-TW.md',
      'plan-ceo-review-SKILL.zh-TW.md',
      'plan-design-review-SKILL.zh-TW.md',
      'plan-eng-review-SKILL.zh-TW.md',
      'qa-only-SKILL.zh-TW.md',
      'qa-SKILL.zh-TW.md',
      'retro-SKILL.zh-TW.md',
      'review-SKILL.zh-TW.md',
      'setup-browser-cookies-SKILL.zh-TW.md',
      'setup-deploy-SKILL.zh-TW.md',
      'ship-SKILL.zh-TW.md',
      'unfreeze-SKILL.zh-TW.md',
    ];

    const els = {
      sidebar: document.getElementById('sidebar'),
      navWrap: document.getElementById('navWrap'),
      content: document.getElementById('content'),
      search: document.getElementById('search'),
      themeToggle: document.getElementById('themeToggle'),
      menuToggle: document.getElementById('menuToggle'),
      docTitle: document.getElementById('docTitle'),
      docSubtitle: document.getElementById('docSubtitle'),
      viewerName: document.getElementById('viewerName'),
      viewerMeta: document.getElementById('viewerMeta'),
      githubBtn: document.getElementById('githubBtn'),
      rawBtn: document.getElementById('rawBtn'),
      docCount: document.getElementById('docCount'),
      groupCount: document.getElementById('groupCount'),
    };

    const state = {
      active: null,
      query: '',
      filtered: [...DOCS],
    };

    marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });

    function rawUrl(name) {
      return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/docs/${encodeURIComponent(name)}`;
    }

    function githubUrl(name) {
      return `https://github.com/${REPO}/blob/${BRANCH}/docs/${encodeURIComponent(name)}`;
    }

    function prettyName(name) {
      return name.replace(/\.md$/i, '').replace(/-/g, ' ').replace(/\bSKILL\b/g, 'Skill');
    }

    function classify(name) {
      if (name === 'SKILL.zh-TW.md') return 'Core';
      if (name.startsWith('plan-') || name.startsWith('autoplan')) return 'Planning';
      if (name.includes('review') || name.startsWith('qa') || name.startsWith('retro')) return 'Review';
      if (name.includes('deploy') || name.includes('ship') || name.includes('freeze') || name.includes('release') || name.includes('canary') || name.includes('browse')) return 'Delivery';
      return 'General';
    }

    function groupDocs(list) {
      const order = ['Core', 'Planning', 'Review', 'Delivery', 'General'];
      const grouped = new Map(order.map(group => [group, []]));
      list.forEach(name => grouped.get(classify(name)).push(name));
      return [...grouped.entries()].filter(([, items]) => items.length > 0);
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem('gstack-theme', theme);
      els.themeToggle.textContent = theme === 'dark' ? '切換白色主題' : '切換黑色主題';
    }

    function initTheme() {
      const saved = localStorage.getItem('gstack-theme');
      if (saved === 'dark' || saved === 'light') return setTheme(saved);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark ? 'dark' : 'light');
    }

    function stripFrontmatter(text) {
      return text.replace(/^---\n[\s\S]*?\n---\n?/, '');
    }

    function readingMeta(text) {
      const words = (text.match(/\S+/g) || []).length;
      const mins = Math.max(1, Math.round(words / 220));
      return `${words} words · 約 ${mins} 分鐘`;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function renderLoading() {
      els.content.innerHTML = `
        <div class="loading" aria-hidden="true">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      `;
    }

    function renderEmpty(message) {
      els.content.innerHTML = `<div class="empty">${message}</div>`;
    }

    function activateNav(name) {
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.name === name);
      });
    }

    function renderNav() {
      const groups = groupDocs(state.filtered);
      els.docCount.textContent = state.filtered.length;
      els.groupCount.textContent = groups.length;

      if (state.filtered.length === 0) {
        els.navWrap.innerHTML = '<div class="empty">找不到符合條件的文件。</div>';
        return;
      }

      els.navWrap.innerHTML = groups.map(([group, items]) => `
        <section>
          <h3 class="group-title">${group}</h3>
          <div class="nav-group">
            ${items.map(name => `
              <button class="nav-item ${state.active === name ? 'active' : ''}" type="button" data-name="${name}">
                <span class="nav-main">
                  <span class="nav-label">${name}</span>
                  <span class="nav-sub">${prettyName(name)}</span>
                </span>
                <span class="nav-badge">md</span>
              </button>
            `).join('')}
          </div>
        </section>
      `).join('');

      els.navWrap.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => loadDoc(btn.dataset.name, true));
      });
    }

    async function loadDoc(name, pushHash = true) {
      state.active = name;
      activateNav(name);
      renderLoading();
      els.docTitle.textContent = name;
      els.docSubtitle.textContent = '正在讀取 markdown 內容…';
      els.viewerName.textContent = name;
      els.viewerMeta.textContent = 'fetching raw markdown';
      els.githubBtn.href = githubUrl(name);
      els.rawBtn.href = rawUrl(name);
      if (pushHash) history.replaceState(null, '', '#' + encodeURIComponent(name));

      try {
        const res = await fetch(rawUrl(name), { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.text();
        const body = stripFrontmatter(raw).trim();
        const html = window.marked ? marked.parse(body) : `<pre>${escapeHtml(body)}</pre>`;
        els.content.innerHTML = window.DOMPurify ? DOMPurify.sanitize(html) : html;
        els.docTitle.textContent = prettyName(name);
        els.docSubtitle.textContent = '真正的 markdown 內頁渲染，主題與版面完全一致。';
        els.viewerName.textContent = name;
        els.viewerMeta.textContent = readingMeta(body);
        document.querySelector('.viewer-body')?.scrollTo({ top: 0, behavior: 'instant' });
        if (window.innerWidth <= 900) {
          els.sidebar.classList.add('collapsed');
        }
      } catch (err) {
        renderEmpty(`讀取失敗：${err.message}`);
        els.docSubtitle.textContent = '檔案載入失敗';
        els.viewerMeta.textContent = 'load failed';
      }
    }

    function applyFilter() {
      const q = els.search.value.trim().toLowerCase();
      state.query = q;
      state.filtered = DOCS.filter(name => name.toLowerCase().includes(q));
      renderNav();
      if (!state.filtered.includes(state.active) && state.filtered[0]) {
        loadDoc(state.filtered[0], false);
      }
      if (state.filtered.length === 0) renderEmpty('找不到符合條件的文件。');
    }

    initTheme();
    renderNav();

    els.themeToggle.addEventListener('click', () => {
      setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    els.menuToggle.addEventListener('click', () => {
      els.sidebar.classList.toggle('collapsed');
    });

    els.search.addEventListener('input', applyFilter);

    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        els.search.focus();
      }
      if (e.key === 'Escape' && window.innerWidth <= 900) {
        els.sidebar.classList.add('collapsed');
      }
    });

    const initial = decodeURIComponent((location.hash || '').replace(/^#/, ''));
    const start = DOCS.includes(initial) ? initial : DOCS[0];
    loadDoc(start, false);
  </script>
</body>
</html>
